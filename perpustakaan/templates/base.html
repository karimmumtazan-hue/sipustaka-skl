<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} SIPUSTAKA {% endblock %}</title>
    <!-- Menggunakan Tailwind CSS versi CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Tambahan Google Fonts Inter agar tipe hurufnya persis seperti di gambar -->
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-[#f4f7fe] flex h-screen text-gray-800 overflow-hidden">

    <!-- SIDEBAR UTAMA (Warna Dongker Gelap Sesuai Gambar Mockup) -->
    <div class="bg-[#0b0f19] h-full w-64 flex-none flex flex-col justify-between p-4 border-r border-gray-900/50">
        <div>
            <!-- Bagian Logo Header Aplikasi -->
            <div class="flex items-center gap-3 px-3 py-4 mb-4 border-b border-gray-800/40">
                <div class="bg-blue-600 text-white font-bold w-10 h-10 rounded-xl flex items-center justify-center text-lg shadow-md shadow-blue-600/20 animate-bounce">
                    P
                </div>
                <div>
                    <p class="text-[10px] text-gray-500 font-bold uppercase tracking-widest leading-none mb-0.5">SIPUSTAKA</p>
                    <h1 class="text-white text-sm font-bold leading-tight">Sistem Peminjaman<br>Buku</h1>
                </div>
            </div>

            <!-- Menu Navigasi Samping Lengkap dengan Ikon -->
            <nav class="space-y-1">
                <!-- Menu Dashboard -->
                <a href="{% url 'dashboard' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition duration-150 {% if request.resolver_match.url_name == 'dashboard' %} bg-[#161b2e] text-white {% else %} text-gray-400 hover:bg-[#161b2e]/50 hover:text-gray-200 {% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2v-4zM14 16a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2v-4z"></path></svg>
                    Dashboard
                </a>

                <!-- Menu Buku -->
                <a href="{% url 'buku_list' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition duration-150 {% if request.resolver_match.url_name == 'buku_list' or 'buku' in request.path %} bg-[#161b2e] text-white {% else %} text-gray-400 hover:bg-[#161b2e]/50 hover:text-gray-200 {% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
                    Buku
                </a>

                <!-- Menu Peminjaman -->
                <a href="{% url 'peminjaman_list' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition duration-150 {% if request.resolver_match.url_name == 'peminjaman_list' or 'peminjaman' in request.path %} bg-[#161b2e] text-white {% else %} text-gray-400 hover:bg-[#161b2e]/50 hover:text-gray-200 {% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    Peminjaman
                </a>

                <!-- Menu Siswa (Diubah Labelnya Menjadi 'User' Sesuai Gambar Mockup) -->
                <a href="{% url 'siswa_list' %}" class="flex items-center gap-3 px-4 py-3 text-sm font-medium rounded-xl transition duration-150 {% if request.resolver_match.url_name == 'siswa_list' or 'siswa' in request.path %} bg-[#161b2e] text-white {% else %} text-gray-400 hover:bg-[#161b2e]/50 hover:text-gray-200 {% endif %}">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4a4 4 0 100 8 4 4 0 000-8zM2 20a6 6 0 0112 0v1H2v-1z"></path></svg>
                    User
                </a>
            </nav>
        </div>

        <!-- KOTAK INFO AKUN ADMIN (Bagian Kiri Bawah) -->
        <div class="bg-[#121625] p-4 rounded-xl border border-gray-800/40">
            <p class="text-[10px] text-gray-500 font-bold uppercase tracking-wider mb-1 leading-none">Admin Aktif</p>
            <p class="text-gray-200 text-sm font-semibold truncate">Karim Baflo A.K.A. KEBO</p>
        </div>
    </div>
    
    <!-- AREA KONTEN UTAMA (Dengan Fitur Scroll Otomatis Jika Data Panjang) -->
    <div class="flex-1 p-8 overflow-y-auto">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
